name: Portfolio Builder Engine
on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Data and Generate Template
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch public repositories safely via curl using the internal system token
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
               "https://github.com" > repos.json

          # Generate the final clean index.html using native bash/jq execution
          bash build_page.sh

      - name: Deploy Flat File changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-rebuild deployment directory" && git push)

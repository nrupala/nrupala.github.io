name: Portfolio Builder Engine
on:
  schedule:
    - cron: '0 0 * * *' # Re-builds automatically every 24 hours
  push:
    branches: [ main ] # Re-builds instantly on pushes to your main branch
  workflow_dispatch: # Manual override build button

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node environment
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Installs the official GitHub automation toolkit so your script can query the API
      - name: Install Official GitHub Toolkit
        run: npm install @actions/github

      # Uses native Node execution instead of a scoped action script wrapper
      - name: Fetch and Compile Static HTML Dashboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node compile.js

      - name: Deploy Flat File changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-rebuild deployment directory" && git push)

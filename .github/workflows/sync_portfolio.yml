name: Generate Portfolio Index Engine

on:
  schedule:
    - cron: '0 0 * * *' # Automatically updates once every 24 hours
  push:
    branches:
      - main # Updates instantly whenever you push code changes to this repository
  workflow_dispatch: # Allows you to manually click a button to force an instant update

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Template
        uses: actions/checkout@v4

      - name: Execute Node Engine Data Compilation
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Fetches all repos using high-priority server credentials
            const response = await github.rest.repos.listForAuthenticatedUser({
              visibility: 'public',
              sort: 'updated',
              per_page: 100
            });
            
            const username = 'nrupala';
            const allRepos = response.data.filter(repo => 
              repo.has_pages && 
              repo.name.toLowerCase() !== `${username}.github.io`.toLowerCase()
            );

            // Pre-compile the Filter Bar dropdown options options
            const uniqueLanguages = [...new Set(allRepos.map(r => r.language).filter(Boolean))];
            let selectOptions = '<option value="all">All Languages</option>';
            uniqueLanguages.forEach(lang => {
              selectOptions += `<option value="${lang.toLowerCase()}">${lang}</option>`;
            });

            // Pre-compile HTML elements directly on the server runner
            let cardsHtml = '';
            allRepos.forEach(repo => {
              const deployedUrl = repo.homepage || `https://${username}.github.io/${repo.name}/`;
              const dateString = new Date(repo.updated_at).toLocaleDateString('en-US', {year:'numeric', month:'short'});
              const activityScore = Math.max(1, (repo.stargazers_count * 3) + (repo.forks_count * 2) + Math.floor(repo.size / 500));
              
              // Build standard server polyline graphs 
              const points = [];
              let baseMetric = Math.max(8, (repo.stargazers_count * 4) + (repo.forks_count * 6));
              if (baseMetric === 8) baseMetric = Math.floor(Math.random() * 12) + 8;
              for(let i = 0; i <= 6; i++) {
                const x = (i / 6) * 400;
                const variance = Math.sin(i * 1.5) * (baseMetric * 0.2);
                const y = Math.max(5, Math.min(40, 42 - (baseMetric * 0.7) - variance));
                points.push(`${x},${y}`);
              }
              const polylinePoints = points.join(' ');

              cardsHtml += `
                <div class="repo-card" data-name="${repo.name.toLowerCase()}" data-desc="${(repo.description || '').toLowerCase()}" data-lang="${(repo.language || 'config').toLowerCase()}">
                    <div>
                        <div class="repo-header">
                            <a href="${deployedUrl}" class="repo-title" target="_blank">🌐 ${repo.name}</a>
                            <a href="${repo.html_url}" class="source-link" target="_blank">&lt;/&gt; Source</a>
                        </div>
                        <div class="repo-desc">${repo.description || 'Production build operational.'}</div>
                        <div class="graph-container">
                            <svg class="graph-svg" viewBox="0 0 400 45">
                                <polyline fill="none" stroke="var(--accent-green)" stroke-width="2" points="${polylinePoints}" />
                            </svg>
                        </div>
                        <div class="stats-panel">
                            <div><div class="stat-val">★ ${repo.stargazers_count}</div><div class="stat-lbl">Stars</div></div>
                            <div><div class="stat-val">⑂ ${repo.forks_count}</div><div class="stat-lbl">Forks</div></div>
                            <div><div class="stat-val">${activityScore}</div><div class="stat-lbl">Activity Index</div></div>
                        </div>
                    </div>
                    <div class="meta-footer">
                        <span class="lang-badge">${repo.language || 'Config'}</span>
                        <span class="date-lbl">Pushed: ${dateString}</span>
                    </div>
                </div>`;
            });

            // Construct the ultimate optimized zero-dependency static page
            const htmlContent = `<!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>nrupala | Engineering Dashboard</title>
                <style>
                    :root { --bg-color: #0d1117; --card-bg: #161b22; --border-color: #30363d; --text-main: #c9d1d9; --text-muted: #8b949e; --accent-blue: #58a6ff; --accent-green: #7ee787; }
                    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; max-width: 950px; margin: 0 auto; padding: 40px 20px; color: var(--text-main); background-color: var(--bg-color); line-height: 1.6; }
                    h1 { font-size: 32px; font-weight: 700; margin-bottom: 5px; color: #fff; }
                    .subtitle { color: var(--text-muted); margin-bottom: 30px; font-size: 16px; }
                    .controls-panel { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; background: var(--card-bg); padding: 15px; border: 1px solid var(--border-color); border-radius: 8px; }
                    .search-input { flex: 1; min-width: 200px; background: var(--bg-color); border: 1px solid var(--border-color); color: #fff; padding: 10px 15px; border-radius: 6px; font-size: 14px; }
                    .search-input:focus { border-color: var(--accent-blue); outline: none; }
                    .filter-select { background: var(--bg-color); border: 1px solid var(--border-color); color: #fff; padding: 10px 15px; border-radius: 6px; font-size: 14px; cursor: pointer; }
                    #repo-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
                    @media(min-width: 768px) { #repo-grid { grid-template-columns: 1fr 1fr; } }
                    .repo-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.2s, border-color 0.2s; }
                    .repo-card:hover { transform: translateY(-3px); border-color: #8b949e; }
                    .repo-card.hidden { display: none !important; }
                    .repo-header { display: flex; justify-content: space-between; align-items: flex-start; }
                    .repo-title { font-size: 18px; font-weight: 600; text-decoration: none; color: var(--accent-blue); display: flex; align-items: center; gap: 6px; }
                    .source-link { font-size: 12px; color: var(--text-muted); text-decoration: none; }
                    .repo-desc { margin: 12px 0; color: var(--text-muted); font-size: 14px; min-height: 42px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
                    .stats-panel { background: rgba(0, 0, 0, 0.2); border-radius: 6px; padding: 10px; margin: 12px 0; display: grid; grid-template-columns: repeat(3, 1fr); text-align: center; font-size: 12px; border: 1px solid rgba(255,255,255,0.05); }
                    .stat-val { font-size: 16px; font-weight: bold; color: #fff; }
                    .stat-lbl { color: var(--text-muted); font-size: 11px; }
                    .graph-container { height: 45px; margin: 10px 0; border-bottom: 1px dashed var(--border-color); position: relative; }
                    .graph-svg { width: 100%; height: 100%; overflow: visible; }
                    .meta-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; font-size: 12px; }
                    .lang-badge { padding: 2px 8px; border-radius: 12px; background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); font-weight: 600; font-size: 11px; }
                    .date-lbl { color: var(--text-muted); font-size: 11px; }
                </style>
            </head>
            <body>
                <h1>nrupala // Engineering Dashboard</h1>
                <div class="subtitle">Compiled live portfolio metrics and directory of active web applications.</div>
                <div class="controls-panel">
                    <input type="text" id="searchBar" class="search-input" placeholder="🔍 Search projects...">
                    <select id="langFilter" class="filter-select">${selectOptions}</select>
                </div>
                <div id="repo-grid">${cardsHtml}</div>
                <script>
                    const searchBar = document.getElementById('searchBar');
                    const langFilter = document.getElementById('langFilter');
                    const cards = document.querySelectorAll('.repo-card');

                    function filterData() {
                        const query = searchBar.value.toLowerCase();
                        const selectedLang = langFilter.value;

                        cards.forEach(card => {
                            const name = card.getAttribute('data-name');
                            const desc = card.getAttribute('data-desc');
                            const lang = card.getAttribute('data-lang');

                            const matchesSearch = name.includes(query) || desc.includes(query);
                            const matchesLang = selectedLang === 'all' || lang === selectedLang;

                            if(matchesSearch && matchesLang) {
                                card.classList.remove('hidden');
                            } else {
                            card.classList.add('hidden');}});}searchBar.addEventListener('input', filterData);langFilter.addEventListener('change', filterData);`;fs.writeFileSync('index.html', htmlContent);- name: Save Compiled Files Back to GitHub Pagesrun: |git config --global user.name "github-actions[bot]"git config --global user.email "github-actions[bot]@users.noreply.github.com"git add index.htmlgit diff --quiet && git diff --staged --quiet || (git commit -m "Auto-rebuild deployment directory portfolio updates" && git push)

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Pages Directory</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; background: #f6f8fa; color: #24292f; }
        h1 { border-bottom: 1px solid #d0d7de; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; margin: 10px 0; padding: 15px; border: 1px solid #d0d7de; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        a { color: #0969da; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .repo-link { font-size: 0.9em; color: #57606a; }
    </style>
</head>
<body>

    <h1>My Deployed GitHub Pages Projects</h1>
    <ul id="repo-list">Loading deployed websites...</ul>

    <script>
        // HARDCODED FIX: Guaranteed to work locally and on the server
        const username = "nrupala";
        const repoList = document.getElementById('repo-list');

        async function fetchPages() {
            try {
                const response = await fetch(`https://github.com{username}/repos?per_page=100&sort=pushed`);
                if (!response.ok) throw new Error('Failed to fetch repositories from GitHub API');
                
                const repos = await response.json();
                repoList.innerHTML = ''; 

                // Filter for repositories that have Pages enabled
                const pagesRepos = repos.filter(repo => repo.has_pages && repo.name.toLowerCase() !== `${username}.github.io`.toLowerCase());

                if (pagesRepos.length === 0) {
                    repoList.innerHTML = '<li>No active GitHub Pages deployments found. Ensure Pages deployment is enabled in your other repository settings!</li>';
                    return;
                }

                pagesRepos.forEach(repo => {
                    const li = document.createElement('li');
                    const pagesUrl = `https://${username}.github.io/${repo.name}/`;
                    
                    li.innerHTML = `
                        <div>
                            <a href="${pagesUrl}" target="_blank">${repo.name}</a>
                            <br>
                            <span class="repo-link">${repo.description || 'No description provided.'}</span>
                        </div>
                        <a href="${repo.html_url}" target="_blank" style="font-size: 0.85em; color: #57606a; font-weight: normal;">[Source Code]</a>
                    `;
                    repoList.appendChild(li);
                });
            } catch (error) {
                repoList.innerHTML = `<li style="color: red;">Error loading repositories: ${error.message}</li>`;
            }
        }

        fetchPages();
    </script>
</body>
</html>
